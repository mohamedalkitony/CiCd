on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'src/**'
  pull_request:
    branches:
      - main
      - 'release/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: npm test
        run: npm test

